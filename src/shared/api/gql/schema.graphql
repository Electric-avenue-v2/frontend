type AttributeAggregation {
  name: String!
  slug: String!
  values: [AttributeValueAggregation!]!
}

input AttributeFilterInput {
  slug: String!
  values: [String!]!
}

type AttributeInfo {
  id: ID!
  name: String!
  slug: String!
}

type AttributeValue {
  attribute: AttributeInfo!
  id: ID!
  value: String!
}

type AttributeValueAggregation {
  count: Int!
  value: String!
}

type Category {
  icon: String
  id: ID!
  name: String!
  parentId: String
  slug: String!
}

input CategoryProductsInput {
  attributes: [AttributeFilterInput!]
  categorySlug: String!
  inStock: Boolean
  limit: Int! = 24
  maxPrice: Float
  minPrice: Float
  page: Int! = 1
  query: String
  sort: ProductSort! = NEWEST
}

input CreateProductInput {
  categoryId: String!
  description: String!
  images: [ProductImageInput!]
  specs: [ProductAttributeInput!]!
  title: String!
  variants: [CreateVariantInput!]!
}

input CreateVariantInput {
  attributes: [ProductAttributeInput!]!
  images: [ProductImageInput!]!
  price: Float!
  sku: String!
  stock: Int!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

input LoginInput {
  email: String!
  password: String!
}

type MessageResponse {
  message: String!
}

type Mutation {
  addFavorite(productId: String!): Boolean!
  createProduct(createProductInput: CreateProductInput!): ProductDetails!
  deleteProduct(id: String!): ProductDetails!
  invalidateCategoriesCache: Boolean!
  login(input: LoginInput!): Tokens!
  logout: MessageResponse!
  refresh: Tokens!
  register(input: RegisterInput!): UserIdResponse!
  removeFavorite(productId: String!): Boolean!
  resendOtp(input: ResendOtpInput!): MessageResponse!
  syncFavorites(input: SyncFavoritesInput!): Boolean!
  verifyOtp(input: VerifyOtpInput!): MessageResponse!
}

type PaginationMeta {
  currentPage: Int!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  itemsPerPage: Int!
  totalItems: Int!
  totalPages: Int!
}

type PriceRangeAggregation {
  max: Float!
  min: Float!
}

input ProductAttributeInput {
  attributeValueId: String!
}

type ProductAttributeValue {
  value: AttributeValue!
}

interface ProductBase {
  category: ProductCategory!
  createdAt: DateTime!
  id: ID!

  """Min price of variants"""
  minPrice: Float
  slug: String!

  """Main picture"""
  thumbnail: String
  title: String!
  updatedAt: DateTime!
}

type ProductCategory {
  icon: String
  id: ID!
  name: String!
  slug: String!
}

type ProductDetails implements ProductBase {
  category: ProductCategory!
  createdAt: DateTime!
  description: String!
  id: ID!

  """Min price of variants"""
  minPrice: Float
  productImages: [ProductImage!]!
  seller: ProductSeller!
  slug: String!
  specs: [ProductAttributeValue!]!

  """Main picture"""
  thumbnail: String
  title: String!
  updatedAt: DateTime!
  variants: [ProductVariant!]!
}

type ProductImage {
  id: ID!
  publicId: String!
  url: String!
}

input ProductImageInput {
  publicId: String!
  url: String!
}

type ProductListItem {
  categoryName: String!
  categorySlug: String!
  id: String!
  inStock: Boolean!
  isLiked: Boolean
  maxPrice: Float!
  minPrice: Float!
  sellerId: String!
  slug: String!
  thumbnailUrl: String
  title: String!
}

type ProductSeller {
  firstName: String!
  id: ID!
  lastName: String!
}

enum ProductSort {
  NEWEST
  POPULAR
  PRICE_ASC
  PRICE_DESC
}

type ProductVariant {
  attributes: [ProductAttributeValue!]
  id: ID!
  price: Float!
  productImages: [ProductImage!]
  sku: String!
  stock: Int!
}

type Query {
  categories: [Category!]!
  categoryBySlug(slug: String!): Category
  categoryProducts(input: CategoryProductsInput!): SearchResult!
  me: UserModel
  product(id: String!): ProductDetails!
  searchProducts(input: SearchProductsInput!): SearchResult!
  searchSuggestions(input: SearchSuggestionsInput!): [SearchSuggestion!]!
}

input RegisterInput {
  email: String!
  firstName: String!
  lastName: String!
  password: String!
}

input ResendOtpInput {
  email: String!
}

type SearchAggregations {
  attributes: [AttributeAggregation!]!
  priceRange: PriceRangeAggregation
}

input SearchProductsInput {
  attributes: [AttributeFilterInput!]
  inStock: Boolean
  limit: Int! = 24
  maxPrice: Float
  minPrice: Float
  page: Int! = 1
  query: String
  sort: ProductSort! = NEWEST
}

type SearchResult {
  aggregations: SearchAggregations!
  items: [ProductListItem!]!
  pagination: PaginationMeta!
}

type SearchSuggestion {
  categoryName: String!
  categorySlug: String!
  id: ID!
  slug: String!
  title: String!
}

input SearchSuggestionsInput {
  query: String!
}

input SyncFavoritesInput {
  productIds: [String!]!
}

type Tokens {
  accessToken: String!
  refreshToken: String!
}

type UserIdResponse {
  userId: String!
}

type UserModel {
  confirmed: Boolean!
  createdAt: DateTime!
  email: String!
  firstName: String!
  id: ID!
  lastName: String!
  role: UserRole!
  updatedAt: DateTime!
}

enum UserRole {
  ADMIN
  USER
}

input VerifyOtpInput {
  email: String!
  otpCode: String!
}